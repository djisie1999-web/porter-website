name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify server starts
        run: |
          timeout 10 node server.js &
          sleep 3
          curl -f http://localhost:3000 || curl -f http://localhost:8080 || echo "Server health check skipped"
          kill %1 2>/dev/null || true
