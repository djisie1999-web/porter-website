<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Porter Admin</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: var(--bg-primary, #0a0a0a); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-container { max-width: 400px; width: 100%; padding: 2.5rem; background: var(--bg-card, #141414); border: 1px solid var(--border, #222); border-radius: 12px; }
    .login-container h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--text-primary, #fff); }
    .login-container p { color: var(--text-secondary, #888); margin-bottom: 1.5rem; font-size: 0.9rem; }
    .login-container label { display: block; color: var(--text-secondary, #ccc); font-size: 0.85rem; margin-bottom: 0.4rem; }
    .login-container input { width: 100%; padding: 0.7rem 0.9rem; background: var(--bg-primary, #0a0a0a); border: 1px solid var(--border, #333); border-radius: 8px; color: var(--text-primary, #fff); font-size: 0.95rem; margin-bottom: 1rem; box-sizing: border-box; }
    .login-container input:focus { outline: none; border-color: var(--accent, #6C63FF); }
    .login-container button { width: 100%; padding: 0.75rem; background: var(--accent, #6C63FF); color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .login-container button:hover { opacity: 0.9; }
    .login-error { color: #f44; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
    .login-logo { text-align: center; margin-bottom: 1.5rem; }
    .login-logo span { font-size: 1.8rem; font-weight: 700; color: var(--text-primary, #fff); }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-logo"><span>Porter</span></div>
    <h1>Admin Login</h1>
    <p>Sign in to access the Porter dashboard.</p>
    <div class="login-error" id="loginError"></div>
    <form id="loginForm">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@company.com" required autofocus>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Password" required>
      <button type="submit">Sign In</button>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('loginError');
      errEl.style.display = 'none';
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/';
        } else {
          errEl.textContent = data.error || 'Invalid credentials';
          errEl.style.display = 'block';
        }
      } catch {
        errEl.textContent = 'Something went wrong. Try again.';
        errEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
